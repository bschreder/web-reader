name: web-reader

services:
  frontend:
    profiles: ["app"]
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
      target: prod
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      VITE_API_URL: ${VITE_API_URL}
      VITE_WS_URL: ${VITE_WS_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_TARGET: ${LOG_TARGET:-console}
      LOG_FILE: ${LOG_FILE:-logs/frontend.log}
    env_file:
      - ../../.env
    depends_on:
      - backend
    volumes:
      - ../../logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend:
    profiles: ["app"]
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: prod
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LANGCHAIN_INTERNAL_URL: ${LANGCHAIN_INTERNAL_URL}
      LANGCHAIN_HOST: ${LANGCHAIN_HOST:-langchain}
      LANGCHAIN_PORT: ${LANGCHAIN_PORT:-8001}
      MAX_CONCURRENT_TASKS: ${MAX_CONCURRENT_TASKS:-5}
      DEFAULT_TIMEOUT: ${DEFAULT_TIMEOUT:-120}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_TARGET: ${LOG_TARGET:-console}
    env_file:
      - ../../.env
    depends_on:
      - langchain
    volumes:
      - ../../config:/app/config:ro
      - ../../data:/app/data
      - ../../logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  langchain:
    profiles: ["app"]
    build:
      context: ../../apps/langchain
      dockerfile: Dockerfile
      target: prod
    ports:
      - "${LANGCHAIN_PORT:-8001}:8001"
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-ollama}
      OLLAMA_PORT: ${OLLAMA_PORT:-11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      FASTMCP_HOST: ${FASTMCP_HOST:-fastmcp}
      FASTMCP_PORT: ${FASTMCP_PORT:-3100}
      FASTMCP_INTERNAL_URL: ${FASTMCP_INTERNAL_URL}
      MAX_ITERATIONS: ${MAX_ITERATIONS:-15}
      MAX_LINK_DEPTH: ${MAX_LINK_DEPTH:-3}
      MAX_PAGES: ${MAX_PAGES:-20}
      TIME_BUDGET: ${TIME_BUDGET:-120}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_TARGET: ${LOG_TARGET:-console}
    env_file:
      - ../../.env
    depends_on:
      - fastmcp
      - ollama
    volumes:
      - ../../config:/app/config:ro
      - ../../logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  fastmcp:
    profiles: ["app"]
    build:
      context: ../../apps/fastmcp
      dockerfile: Dockerfile
      target: prod
    ports:
      - "${MCP_SERVER_PORT:-3100}:3100"
      - "${HEALTH_SERVER_PORT:-3101}:3101"
    environment:
      PLAYWRIGHT_HOST: ${PLAYWRIGHT_HOST:-playwright}
      PLAYWRIGHT_PORT: ${PLAYWRIGHT_PORT:-3002}
      PLAYWRIGHT_WS_URL: ${PLAYWRIGHT_WS_URL}
      MCP_SERVER_PORT: ${MCP_SERVER_PORT:-3100}
      HEALTH_SERVER_PORT: ${HEALTH_SERVER_PORT:-3101}
      BROWSER_TYPE: ${BROWSER_TYPE:-chromium}
      ENABLE_RATE_LIMITING: ${ENABLE_RATE_LIMITING:-true}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-5}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-90}
      REQUEST_DELAY_MIN: ${REQUEST_DELAY_MIN:-10}
      REQUEST_DELAY_MAX: ${REQUEST_DELAY_MAX:-20}
      RESPECT_ROBOTS_TXT: ${RESPECT_ROBOTS_TXT:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_TARGET: ${LOG_TARGET:-console}
    env_file:
      - ../../.env
    depends_on:
      - playwright
    volumes:
      - ../../config:/app/config:rw
      - ../../logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3101/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ollama:
    profiles: ["infra"]
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_NUM_PARALLEL: 1
      OLLAMA_MAX_QUEUE: 2
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-131072}
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "bash", "-lc", "(echo > /dev/tcp/127.0.0.1/11434) >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  playwright:
    profiles: ["infra"]
    image: mcr.microsoft.com/playwright:v1.56.1-noble
    restart: unless-stopped
    init: true
    ipc: host
    user: pwuser
    command: ["/bin/sh", "-lc", "npx -y playwright@1.56.1 run-server --port 3002 --host 0.0.0.0"]
    ports:
      - "${PLAYWRIGHT_PORT:-3002}:3002"
    shm_size: 1gb
    healthcheck:
      test: ["CMD", "bash", "-lc", "(echo > /dev/tcp/127.0.0.1/3002) >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  model-loader:
    profiles: ["infra"]
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
    entrypoint: ["/bin/sh", "-c"]
    command: >-
      "
      echo 'Waiting for Ollama...';
      until curl -sf http://ollama:11434/api/version >/dev/null; do sleep 2; done;
      echo 'Pulling model '$${OLLAMA_MODEL}'...';
      curl -s -X POST http://ollama:11434/api/pull -H 'content-type: application/json' -d '{\"name\":\"'$${OLLAMA_MODEL}'\"}' || true;
      echo 'Model pull requested.'
      "

volumes:
  ollama:
    driver: local
