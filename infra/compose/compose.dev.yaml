services:
  frontend:
    build:
      target: dev
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      NODE_OPTIONS: --inspect=0.0.0.0:9229
    ports:
      - "9229:9229"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

  backend:
    build:
      target: dev
    environment:
      DEBUGPY_PORT: 5671
    ports:
      - "5671:5671"
    command: >-
      sh -c "python -m debugpy --listen 0.0.0.0:${DEBUGPY_PORT:-5671} -m uvicorn server:app --host 0.0.0.0 --port 8000 --reload"

  langchain:
    build:
      target: dev
    environment:
      DEBUGPY_PORT: 5672
    ports:
      - "5672:5672"
    command: >-
      sh -c "python -m debugpy --listen 0.0.0.0:${DEBUGPY_PORT:-5672} server.py"

  fastmcp:
    build:
      target: dev
    environment:
      LOG_LEVEL: debug
      LOG_TARGET: console
      DEBUGPY_PORT: 5673
    ports:
      - "3100:3100"
      - "3101:3101"
      - "5673:5673"
    command: >-
      sh -c "python -m debugpy --listen 0.0.0.0:${DEBUGPY_PORT:-5673} server.py"
